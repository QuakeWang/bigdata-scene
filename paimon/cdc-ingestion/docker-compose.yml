services:
  # ============================================================
  # MySQL 8.0 — CDC Source
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: paimon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: tpch
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./scripts/simulate-cdc-changes.sh:/opt/scripts/simulate-cdc-changes.sh
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - paimon-net

  # ============================================================
  # MinIO — S3-compatible Object Storage (Paimon warehouse)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: paimon-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      - "9002:9000"
      - "9003:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - paimon-net

  # MinIO bucket initialization
  createbuckets:
    image: minio/mc:latest
    container_name: paimon-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin admin123456;
      mc mb myminio/paimon --ignore-existing;
      mc anonymous set public myminio/paimon;
      echo 'Bucket paimon created successfully';
      "
    networks:
      - paimon-net

  # ============================================================
  # Flink JobManager
  # ============================================================
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paimon-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        execution.checkpointing.interval: 30s
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.runtime-mode: STREAMING
    volumes:
      - ./flink-sql:/opt/flink-sql
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - paimon-net

  # ============================================================
  # Flink TaskManager
  # ============================================================
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paimon-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
    depends_on:
      - jobmanager
    networks:
      - paimon-net

networks:
  paimon-net:
    driver: bridge
